apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: catalogreleases.edgedip.io
spec:
  group: edgedip.io
  names:
    kind: CatalogRelease
    listKind: CatalogReleaseList
    plural: catalogreleases
    singular: catalogrelease
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [releaseName, version, harborUrl, packages]
              properties:
                releaseName:
                  type: string
                version:
                  type: string
                harborUrl:
                  type: string
                packages:
                  type: array
                  items:
                    type: object
                    required: [name, version]
                    properties:
                      name:
                        type: string
                      version:
                        type: string
                      digest:
                        type: string
                cveReport:
                  type: object
                  properties:
                    critical:
                      type: integer
                    high:
                      type: integer
                    medium:
                      type: integer
                    low:
                      type: integer
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Draft, Published, Deprecated]
                publishedAt:
                  type: string
                  format: date-time
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Release
          type: string
          jsonPath: .spec.releaseName
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
