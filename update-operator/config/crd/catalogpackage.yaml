apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: catalogpackages.edgedip.io
spec:
  group: edgedip.io
  names:
    kind: CatalogPackage
    listKind: CatalogPackageList
    plural: catalogpackages
    singular: catalogpackage
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [packageName, approvedVersion, approvalId, harborUrl]
              properties:
                packageName:
                  type: string
                approvedVersion:
                  type: string
                approvalId:
                  type: string
                harborUrl:
                  type: string
                autoRollback:
                  type: boolean
                  default: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Idle, Downloading, Applying, HealthCheck, Ready, Failed, RolledBack]
                installedVersion:
                  type: string
                lastAppliedAt:
                  type: string
                  format: date-time
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Package
          type: string
          jsonPath: .spec.packageName
        - name: Version
          type: string
          jsonPath: .spec.approvedVersion
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
