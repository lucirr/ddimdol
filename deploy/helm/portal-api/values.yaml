replicaCount: 2

image:
  repository: harbor.internal/edgedip/portal-api
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  apiPort: 8080
  agentPort: 8081

env:
  DATABASE_URL: ""
  NATS_URL: ""
  KEYCLOAK_URL: ""
  KEYCLOAK_REALM: edgedip
  KEYCLOAK_CLIENT_ID: portal-api
  SERVER_PORT: "8080"
  AGENT_PORT: "8081"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20
