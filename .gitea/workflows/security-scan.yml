name: Security Scan

# push 트리거: 개발자가 Harbor에 push하면 자동 실행 → DRAFT 자동 생성
# workflow_dispatch: 외부 이미지(벤더 제공 등) 수동 스캔 시 사용
on:
  push:
    branches: ['main']
  workflow_dispatch:
    inputs:
      release_id:
        description: "기존 Portal API Release UUID (비워두면 자동 생성)"
        required: false
        type: string
      image_ref:
        description: "Harbor image reference (e.g. harbor.local/vendor/app:v1.2.3)"
        required: true
        type: string
      package_name:
        description: "패키지 이름 (자동 생성 시 필요)"
        required: false
        type: string
      version:
        description: "버전 (자동 생성 시 필요, e.g. v1.2.3)"
        required: false
        type: string
      artifact_digest:
        description: "이미지 digest (자동 생성 시 필요, sha256:...)"
        required: false
        type: string

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 0: 입력값 결정 및 검증
  #   - push 트리거: image_ref를 git 태그/커밋에서 구성, release_id는 다음 job에서 생성
  #   - dispatch 트리거: 입력값 그대로 사용
  # ──────────────────────────────────────────────────────────────
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.resolve.outputs.image_ref }}
      package_name: ${{ steps.resolve.outputs.package_name }}
      version: ${{ steps.resolve.outputs.version }}
      artifact_digest: ${{ steps.resolve.outputs.artifact_digest }}
      need_draft: ${{ steps.resolve.outputs.need_draft }}
      release_id: ${{ steps.resolve.outputs.release_id }}
    env:
      HARBOR_URL: ${{ vars.HARBOR_URL }}
      HARBOR_USER: ${{ secrets.HARBOR_USER }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve inputs
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE_REF: ${{ github.event.inputs.image_ref }}
          INPUT_RELEASE_ID: ${{ github.event.inputs.release_id }}
          INPUT_PACKAGE_NAME: ${{ github.event.inputs.package_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_ARTIFACT_DIGEST: ${{ github.event.inputs.artifact_digest }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
          REPO_NAME: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            # push 트리거: image_ref를 Harbor URL + repo + 커밋 SHA로 구성
            SHORT_SHA="${GIT_SHA:0:8}"
            PKG_NAME=$(basename "$REPO_NAME")
            VERSION="git-${SHORT_SHA}"
            IMAGE_REF="${HARBOR_URL}/${PKG_NAME}:${VERSION}"

            echo "image_ref=${IMAGE_REF}"       >> "$GITHUB_OUTPUT"
            echo "package_name=${PKG_NAME}"     >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}"           >> "$GITHUB_OUTPUT"
            echo "artifact_digest="             >> "$GITHUB_OUTPUT"
            echo "need_draft=true"              >> "$GITHUB_OUTPUT"
            echo "release_id="                  >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch 트리거
            if [ -z "$INPUT_IMAGE_REF" ]; then
              echo "::error::image_ref is required for manual dispatch"
              exit 1
            fi

            # release_id가 있으면 기존 릴리즈에 스캔만 수행, 없으면 DRAFT 생성
            if [ -n "$INPUT_RELEASE_ID" ]; then
              echo "need_draft=false"           >> "$GITHUB_OUTPUT"
              echo "release_id=${INPUT_RELEASE_ID}" >> "$GITHUB_OUTPUT"
            else
              echo "need_draft=true"            >> "$GITHUB_OUTPUT"
              echo "release_id="                >> "$GITHUB_OUTPUT"
            fi

            echo "image_ref=${INPUT_IMAGE_REF}"             >> "$GITHUB_OUTPUT"
            echo "package_name=${INPUT_PACKAGE_NAME}"       >> "$GITHUB_OUTPUT"
            echo "version=${INPUT_VERSION}"                 >> "$GITHUB_OUTPUT"
            echo "artifact_digest=${INPUT_ARTIFACT_DIGEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate image_ref format
        env:
          IMAGE_REF: ${{ steps.resolve.outputs.image_ref }}
        run: |
          # host[:port]/path/name(:tag|@sha256:digest) — leading hyphen rejected
          if ! echo "$IMAGE_REF" | grep -qE '^[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])?(:[0-9]+)?(/[a-zA-Z0-9._-]+)+(@sha256:[a-f0-9]{64}|:[a-zA-Z0-9._-]+)$'; then
            echo "::error::image_ref has an invalid format: ${IMAGE_REF}"
            exit 1
          fi

      - name: Validate release_id format (when provided)
        env:
          RELEASE_ID: ${{ steps.resolve.outputs.release_id }}
        run: |
          if [ -n "$RELEASE_ID" ]; then
            if ! echo "$RELEASE_ID" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
              echo "::error::release_id is not a valid UUID: ${RELEASE_ID}"
              exit 1
            fi
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 1: DRAFT 자동 생성 (push 트리거 또는 dispatch에서 release_id 미입력 시)
  # ──────────────────────────────────────────────────────────────
  draft-register:
    name: Register Draft Release
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ needs.validate.outputs.need_draft == 'true' }}
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    env:
      IMAGE_REF: ${{ needs.validate.outputs.image_ref }}
      PACKAGE_NAME: ${{ needs.validate.outputs.package_name }}
      VERSION: ${{ needs.validate.outputs.version }}
      ARTIFACT_DIGEST: ${{ needs.validate.outputs.artifact_digest }}
      PORTAL_API_URL: ${{ vars.PORTAL_API_URL }}
      PORTAL_API_TOKEN: ${{ secrets.PORTAL_API_TOKEN }}
    steps:
      - name: Create DRAFT release via portal-api
        id: create
        run: |
          # artifact_digest가 없으면 image_ref에서 digest를 조회하거나 빈 값 허용
          DIGEST="${ARTIFACT_DIGEST:-}"

          PAYLOAD=$(jq -nc \
            --arg pkg  "$PACKAGE_NAME" \
            --arg ver  "$VERSION" \
            --arg dig  "$DIGEST" \
            --arg img  "$IMAGE_REF" \
            '{package_name:$pkg, version:$ver, artifact_digest:$dig, image_ref:$img}')

          RESPONSE=$(curl -fsSL -X POST \
            "${PORTAL_API_URL}/api/v1/releases" \
            -H "Authorization: Bearer ${PORTAL_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.data.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "::error::Failed to create DRAFT release. Response: ${RESPONSE}"
            exit 1
          fi

          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "Created DRAFT release: ${RELEASE_ID}"

  # ──────────────────────────────────────────────────────────────
  # Job 2: release_id 집약 (draft-register 실행 여부에 따라 분기)
  # ──────────────────────────────────────────────────────────────
  resolve-release-id:
    name: Resolve Release ID
    runs-on: ubuntu-latest
    needs: [validate, draft-register]
    if: always() && needs.validate.result == 'success' && (needs.draft-register.result == 'success' || needs.draft-register.result == 'skipped')
    outputs:
      release_id: ${{ steps.pick.outputs.release_id }}
      image_ref: ${{ needs.validate.outputs.image_ref }}
    steps:
      - name: Pick release_id
        id: pick
        env:
          FROM_DRAFT: ${{ needs.draft-register.outputs.release_id }}
          FROM_INPUT: ${{ needs.validate.outputs.release_id }}
        run: |
          RELEASE_ID="${FROM_DRAFT:-$FROM_INPUT}"
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::release_id could not be determined"
            exit 1
          fi
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────
  # Job 3: SBOM 생성 (Syft)
  # ──────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: resolve-release-id
    outputs:
      sbom_uri: ${{ steps.attach.outputs.sbom_uri }}
    env:
      IMAGE_REF: ${{ needs.resolve-release-id.outputs.image_ref }}
      HARBOR_URL: ${{ vars.HARBOR_URL }}
      HARBOR_USER: ${{ secrets.HARBOR_USER }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
    steps:
      - name: Log in to Harbor
        run: echo "$HARBOR_PASSWORD" | docker login "$HARBOR_URL" -u "$HARBOR_USER" --password-stdin

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Install oras
        run: |
          curl -sSfL https://github.com/oras-project/oras/releases/download/v1.1.0/oras_1.1.0_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin oras

      - name: Generate SBOM (SPDX JSON)
        run: syft -- "$IMAGE_REF" -o spdx-json=sbom.spdx.json

      - name: Attach SBOM to Harbor (OCI referrer)
        id: attach
        run: |
          oras attach \
            --artifact-type application/spdx+json \
            -- "$IMAGE_REF" \
            sbom.spdx.json:application/spdx+json
          echo "sbom_uri=${IMAGE_REF}-sbom" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────
  # Job 4: CVE 스캔 (Trivy)
  # ──────────────────────────────────────────────────────────────
  cve-scan:
    name: CVE Scan
    runs-on: ubuntu-latest
    needs: [resolve-release-id, sbom]
    outputs:
      critical: ${{ steps.parse.outputs.critical }}
      high: ${{ steps.parse.outputs.high }}
      medium: ${{ steps.parse.outputs.medium }}
      low: ${{ steps.parse.outputs.low }}
    env:
      IMAGE_REF: ${{ needs.resolve-release-id.outputs.image_ref }}
      RELEASE_ID: ${{ needs.resolve-release-id.outputs.release_id }}
      PORTAL_API_URL: ${{ vars.PORTAL_API_URL }}
      PORTAL_API_TOKEN: ${{ secrets.PORTAL_API_TOKEN }}
      HARBOR_URL: ${{ vars.HARBOR_URL }}
      HARBOR_USER: ${{ secrets.HARBOR_USER }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
    steps:
      - name: Log in to Harbor
        run: echo "$HARBOR_PASSWORD" | docker login "$HARBOR_URL" -u "$HARBOR_USER" --password-stdin

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        run: |
          trivy image \
            --format json \
            --output trivy-report.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            -- "$IMAGE_REF"

      - name: Parse severity counts
        id: parse
        run: |
          python3 - <<'EOF'
          import json, os

          with open("trivy-report.json") as f:
              report = json.load(f)

          counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0}
          for result in report.get("Results", []):
              for vuln in result.get("Vulnerabilities") or []:
                  sev = vuln.get("Severity", "").upper()
                  if sev in counts:
                      counts[sev] += 1

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"critical={counts['CRITICAL']}\n")
              out.write(f"high={counts['HIGH']}\n")
              out.write(f"medium={counts['MEDIUM']}\n")
              out.write(f"low={counts['LOW']}\n")

          print(f"CRITICAL={counts['CRITICAL']} HIGH={counts['HIGH']} MEDIUM={counts['MEDIUM']} LOW={counts['LOW']}")
          EOF

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v3
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Update portal-api cve-report (SCANNED)
        run: |
          SBOM_URI="${{ needs.sbom.outputs.sbom_uri }}"
          PAYLOAD=$(jq -nc \
            --argjson critical "${{ steps.parse.outputs.critical }}" \
            --argjson high     "${{ steps.parse.outputs.high }}" \
            --argjson medium   "${{ steps.parse.outputs.medium }}" \
            --argjson low      "${{ steps.parse.outputs.low }}" \
            --arg     sbom_uri "$SBOM_URI" \
            '{critical:$critical, high:$high, medium:$medium, low:$low, sbom_uri:$sbom_uri}')

          curl -fsSL -X PATCH \
            "${PORTAL_API_URL}/api/v1/releases/${RELEASE_ID}/cve-report" \
            -H "Authorization: Bearer ${PORTAL_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD"

      - name: Fail if Critical CVEs found
        if: ${{ steps.parse.outputs.critical > 0 }}
        run: |
          echo "::error::Critical CVEs found (${{ steps.parse.outputs.critical }}). Pipeline stopped."
          exit 1

  # ──────────────────────────────────────────────────────────────
  # Job 5: Cosign 서명
  # ──────────────────────────────────────────────────────────────
  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: [resolve-release-id, cve-scan]
    env:
      IMAGE_REF: ${{ needs.resolve-release-id.outputs.image_ref }}
      RELEASE_ID: ${{ needs.resolve-release-id.outputs.release_id }}
      PORTAL_API_URL: ${{ vars.PORTAL_API_URL }}
      PORTAL_API_TOKEN: ${{ secrets.PORTAL_API_TOKEN }}
      HARBOR_URL: ${{ vars.HARBOR_URL }}
      HARBOR_USER: ${{ secrets.HARBOR_USER }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
      COSIGN_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      COSIGN_KEY_PASSWORD: ${{ secrets.COSIGN_KEY_PASSWORD }}
    steps:
      - name: Log in to Harbor
        run: echo "$HARBOR_PASSWORD" | docker login "$HARBOR_URL" -u "$HARBOR_USER" --password-stdin

      - name: Install Cosign
        run: |
          curl -sSfL \
            https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 \
            -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign

      - name: Fetch and verify release.image_ref from portal-api
        id: fetch_release
        run: |
          RELEASE_JSON=$(curl -fsSL \
            "${PORTAL_API_URL}/api/v1/releases/${RELEASE_ID}" \
            -H "Authorization: Bearer ${PORTAL_API_TOKEN}")

          DB_IMAGE_REF=$(echo "$RELEASE_JSON" | jq -r '.data.image_ref // empty')

          if [ -z "$DB_IMAGE_REF" ]; then
            echo "::error::Release ${RELEASE_ID} has no image_ref in portal-api"
            exit 1
          fi

          if [ "$DB_IMAGE_REF" != "$IMAGE_REF" ]; then
            echo "::error::image_ref mismatch — workflow: '${IMAGE_REF}', portal-api DB: '${DB_IMAGE_REF}'"
            exit 1
          fi

          echo "image_ref_verified=${DB_IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Write Cosign key
        run: |
          echo "$COSIGN_KEY" > cosign.key
          chmod 600 cosign.key

      - name: Write Cosign public key
        run: |
          echo "${{ secrets.COSIGN_PUBLIC_KEY }}" > cosign.pub
          chmod 600 cosign.pub

      - name: Sign image
        id: cosign
        run: |
          COSIGN_PASSWORD="$COSIGN_KEY_PASSWORD" cosign sign \
            --key cosign.key \
            -- "$IMAGE_REF"

          SIG_REF=$(cosign triangulate -- "$IMAGE_REF" 2>/dev/null || echo "${IMAGE_REF}-sig")
          echo "signature=${SIG_REF}" >> "$GITHUB_OUTPUT"

      - name: Verify signature (gate before notifying portal-api)
        run: |
          cosign verify \
            --key cosign.pub \
            -- "$IMAGE_REF"

      - name: Cleanup keys
        if: always()
        run: rm -f cosign.key cosign.pub

      - name: Update portal-api sign status (SIGNED)
        run: |
          SIG="${{ steps.cosign.outputs.signature }}"
          PAYLOAD=$(jq -nc --arg sig "$SIG" --arg img "$IMAGE_REF" \
            '{signature: $sig, image_ref: $img}')

          curl -fsSL -X PATCH \
            "${PORTAL_API_URL}/api/v1/releases/${RELEASE_ID}/sign" \
            -H "Authorization: Bearer ${PORTAL_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD"

      - name: Summary
        run: |
          {
            echo "## Security Scan Complete ✅"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | \`${IMAGE_REF}\` |"
            echo "| Release ID | \`${RELEASE_ID}\` |"
            echo "| Critical CVEs | ${{ needs.cve-scan.outputs.critical }} |"
            echo "| High CVEs | ${{ needs.cve-scan.outputs.high }} |"
            echo "| Status | SIGNED — 관리자 publish 대기 중 |"
          } >> "$GITHUB_STEP_SUMMARY"
